[pytest]
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (filesystem/embeddings, no LLM required)
    e2e: End-to-end tests (slow, full workflow with live LLM)
    slow: Slow tests (> 60 seconds)
    requires_api_key: Tests requiring API keys

addopts =
    --tb=short
    --disable-warnings
    -ra
