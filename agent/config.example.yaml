# AI Software Development Crew - Secure Configuration
# 
# Security: This file contains sensitive credentials
# Required file permissions: chmod 600 config.yaml
# Required ownership: chown your_user:your_group config.yaml
#
# Usage:
#   1. Copy this file: cp config.example.yaml ~/.crew-ai/config.yaml
#   2. Set permissions: chmod 600 ~/.crew-ai/config.yaml
#   3. Edit with your values
#   4. Run: python -m llamaindex_crew.main --config ~/.crew-ai/config.yaml "your vision"

# LLM Configuration
llm:
  # API key for your LLM provider (REQUIRED)
  api_key: "your_api_key_here"

  # Base URL for API endpoint (optional, defaults to OpenAI)
  # Examples:
  #   Red Hat MaaS: "https://litellm-prod.apps.maas.redhatworkshops.io"
  #   OpenRouter:   "https://openrouter.ai/api/v1"
  #   Azure OpenAI: "https://YOUR_RESOURCE.openai.azure.com"
  #   OpenAI:       (leave unset for default)
  api_base_url: "https://litellm-prod.apps.maas.redhatworkshops.io"

  # Environment: "production" or "local" (Ollama)
  environment: "production"

  # Model configuration
  model_manager: "gpt-4o-mini"
  model_worker: "gpt-4o-mini"
  model_reviewer: "gpt-4o-mini"

  # LLM parameters
  max_tokens: 2048
  temperature: 0.7
  embedding_model: "text-embedding-3-small"

  # Ollama configuration (when environment: local)
  ollama_base_url: "http://localhost:11434"
  ollama_model: "llama3.2:latest"

  # ReAct capability override (optional — auto-detected from model name by default).
  # Set to false for weak/free/small models (e.g. openrouter :free tier, 7B/8B models)
  # to use single-shot structured JSON output instead of multi-turn tool loops.
  # Auto-detection matches patterns: ":free", "8b", "7b", "phi-3", "mistral-7b" etc.
  # supports_react: true

# Budget Configuration
budget:
  # Maximum cost per project in USD
  max_cost_per_project: 100.0
  
  # Maximum cost per hour in USD
  max_cost_per_hour: 10.0
  
  # Alert when budget reaches this threshold (0.0 - 1.0)
  alert_threshold: 0.8

# Workspace Configuration
workspace:
  # Base path for generated code
  path: "./workspace"

# Logging Configuration
logging:
  # Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: "INFO"

# ── Skills Service ────────────────────────────────────────────────────────────
# Optional: connects agents to the skills-service for domain-specific guidance.
# When service_url is unset (null), the skill query tool is not loaded.
skills:
  service_url: null  # e.g. "http://skills-service:8090"

# ── Extra Tools ───────────────────────────────────────────────────────────────
# Declare additional tools to inject into agents at startup.
# Two types: "native" (Python module) and "mcp" (MCP server bridge).
#
# global_tools:  added to ALL agents
# agent_tools:   keyed by agent role slug — added only to that agent
tools:
  global_tools: []
    # Example: give every agent the skill query tool
    # - type: native
    #   module: "llamaindex_crew.tools.skill_tools"
    #   name: "SkillQueryTool"
    #   config:
    #     service_url: "http://skills-service:8090"

  agent_tools: {}
    # Example: developer agent gets skill search scoped to python + a Jira MCP server
    # developer:
    #   - type: native
    #     module: "llamaindex_crew.tools.skill_tools"
    #     name: "SkillQueryTool"
    #     config:
    #       service_url: "http://skills-service:8090"
    #       default_tags: ["python", "backend"]
    #   - type: mcp
    #     server_name: "jira"
    #     command: "python"
    #     args: ["-m", "crew_jira_connector.server"]
    #     env:
    #       JIRA_URL: "https://jira.example.com"
    #       JIRA_TOKEN: "${JIRA_TOKEN}"
    # frontend:
    #   - type: native
    #     module: "llamaindex_crew.tools.skill_tools"
    #     name: "SkillQueryTool"
    #     config:
    #       service_url: "http://skills-service:8090"
    #       default_tags: ["react", "frontend"]

# ── Plan Review Gate ────────────────────────────────────────────────────────────
# When enabled, the workflow pauses after TA for human plan review before coding.
plan_review:
  enabled: false

# ── Workflow Pipelines ───────────────────────────────────────────────────────────
# Phase lists keyed by solutioning_path (full, fast, edit, refactor).
# Adaptive path uses smart_router.decide_workflow_phases() on first run; the
# resolved pipeline is stored on the job as selected_workflow_phases for resume.
# Omit this section to use built-in defaults (see workflow_resolver.FALLBACK_PIPELINES).
#
# workflows:
#   full:
#     - meta
#     - stack_contract
#     - product_owner
#     - designer
#     - tech_architect
#     - qa
#     - parallel: [development, frontend, devops]
#   fast:
#     - meta
#     - stack_contract
#     - seed_minimal_artifacts
#     - parallel: [development, frontend]

# ── Solutioning Loop ────────────────────────────────────────────────────────────
# Research + architect + critique loop between Meta and PO phases.
solutioning:
  enabled: false
  max_passes: 3
  max_github_searches: 10

# ── Generation Performance ─────────────────────────────────────────────────────
# Controls how many files are generated concurrently during the development phase.
# Can also be set via the PARALLEL_FILE_WORKERS environment variable (env var wins).
generation:
  parallel_file_workers: 5

  # Simple mode (supports_react=false) — small/weak models
  simple_mode_max_retries: 2              # 3 attempts total; keep for small models
  simple_mode_retry_critical_only: false  # retry on stubs/placeholders too
  simple_mode_skip_rag: true              # skip per-file RAG for speed (large files auto-opt-in)

  # Prompt size limits (simple mode). Large targets (DocTypes, hooks.py, etc.) use the
  # simple_mode_large_file_* budgets automatically.
  simple_mode_max_tech_stack_chars: 12000
  simple_mode_max_user_stories_chars: 3000
  simple_mode_large_file_tech_stack_chars: 24000
  simple_mode_large_file_user_stories_chars: 6000
  simple_mode_large_file_related_chars: 16384

  # Workflow-side tldr context for simple mode (requires llm-tldr in PATH).
  # Pre-computes structure/search/impact output and injects it into the
  # single-shot file-generation prompt so weak models have codebase context.
  simple_mode_tldr_enabled: true          # master switch (disable if tldr not installed)
  simple_mode_tldr_max_chars: 6000        # total injected chars (structure + search + impact)
  simple_mode_tldr_include_structure: true # include 'tldr structure' (cached per job)
  simple_mode_tldr_min_completed_files: 1  # skip until at least N files completed (0 = always)
