name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  # Sanity check — make sure the package installs and the app imports without errors.
  # All heavy tests, lint, docs, and E2E are disabled until the test suite is stable.
  import-check:
    name: Import Sanity Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        working-directory: agent
        run: pip install -e ".[test]"

      - name: Check main app imports
        run: |
          cd opl-ai-software-team || true
          python -c "from crew_studio.llamaindex_web_app import app; print('OK: app imported')"
        env:
          PYTHONPATH: ${{ github.workspace }}
