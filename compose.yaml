# ─────────────────────────────────────────────────────────────────────────────
# AI Crew Studio — Full Stack Compose (Backend + Frontend + Validator)
# Compatible with: podman-compose, docker compose
#
# Usage:
#   podman compose up -d              # start all services
#   podman compose up -d --build      # rebuild and start
#   podman compose logs -f            # follow all logs
#   podman compose logs -f backend    # follow backend only
#   podman compose logs -f validator  # follow validator only
#   podman compose down               # stop all
#   podman compose down -v            # stop + remove volumes
#
# E2E test:
#   ./scripts/trigger-and-validate.sh  # create job → wait → validate
#
# Environment:
#   Copy .env.example → .env and fill in API keys before starting.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Backend: Flask API + AI Agents ───────────────────────────────────────
  backend:
    container_name: crew-backend
    build:
      context: .
      dockerfile: Containerfile.backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - crew-workspace:/app/workspace
      - crew-data:/app/data
      - ${CONFIG_FILE:-./config.yaml}:/app/config.yaml:ro,z
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - WORKSPACE_PATH=/app/workspace
      - JOB_DB_PATH=/app/data/crew_jobs.db
      - CONFIG_FILE_PATH=/app/config.yaml
      - FLASK_ENV=${FLASK_ENV:-production}
      - PYTHONUNBUFFERED=1
      # Validator sidecar — backend can call this after code generation
      - VALIDATOR_URL=http://validator:8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    depends_on:
      validator:
        condition: service_healthy
    networks:
      - crew-net

  # ── Code Validator: FastAPI Microservice ─────────────────────────────────
  # Language-agnostic validation (syntax, imports, entrypoint, contract).
  # Reads generated code from the shared workspace volume (read-only).
  validator:
    container_name: crew-validator
    build:
      context: ${VALIDATOR_DIR:-../crew-code-validator}
      dockerfile: Containerfile
    ports:
      - "${VALIDATOR_PORT:-8180}:8080"
    volumes:
      # Same workspace PVC as backend — validator reads what agents write
      - crew-workspace:/app/workspace:ro
    environment:
      - LOG_LEVEL=${VALIDATOR_LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 3
    networks:
      - crew-net

  # ── Frontend: React + PatternFly (Nginx) ─────────────────────────────────
  frontend:
    container_name: crew-frontend
    build:
      context: .
      dockerfile: Containerfile.frontend
    ports:
      - "${FRONTEND_PORT:-3000}:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - crew-net

  # ── Ollama (optional): Local LLM inference ──────────────────────────────
  # Uncomment to run models locally instead of using cloud APIs
  #
  # ollama:
  #   container_name: crew-ollama
  #   image: docker.io/ollama/ollama:latest
  #   ports:
  #     - "${OLLAMA_PORT:-11434}:11434"
  #   volumes:
  #     - ollama-models:/root/.ollama
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
  #     interval: 30s
  #     timeout: 10s
  #     start_period: 30s
  #     retries: 3
  #   networks:
  #     - crew-net

volumes:
  crew-workspace:
    driver: local
  crew-data:
    driver: local
  # ollama-models:
  #   driver: local

networks:
  crew-net:
    driver: bridge
