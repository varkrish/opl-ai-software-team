# ─────────────────────────────────────────────────────────────────────────────
# AI Crew Studio — Backend + Validator Compose
# Frontend is in a separate repo (opl-studio-ui); see mono repo dev-compose.yml.
# Compatible with: podman-compose, docker compose
#
# Usage:
#   podman compose up -d              # start all services
#   podman compose up -d --build      # rebuild and start
# Linux server / Quay images from Apple Silicon: build amd64 images first, e.g.
#   make container-build-linux
# then tag/load as needed; compose uses local image names by default.
#   podman compose logs -f            # follow all logs
#   podman compose logs -f backend    # follow backend only
#   podman compose logs -f validator  # follow validator only
#   podman compose down               # stop all
#   podman compose down -v            # stop + remove volumes
#
# E2E test:
#   ./scripts/trigger-and-validate.sh  # create job → wait → validate
#
# Environment:
#   Copy .env.example → .env and fill in API keys before starting.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Backend: Flask API + AI Agents ───────────────────────────────────────
  backend:
    container_name: crew-backend
    build:
      context: .
      dockerfile: Containerfile.backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - crew-workspace:/app/workspace
      - crew-data:/app/data
      - ${CONFIG_FILE:-./config.yaml}:/app/config.yaml:ro,z
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - WORKSPACE_PATH=/app/workspace
      - JOB_DB_PATH=/app/data/crew_jobs.db
      - CONFIG_FILE_PATH=/app/config.yaml
      - FLASK_ENV=${FLASK_ENV:-production}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      - PYTHONUNBUFFERED=1
      # Validator sidecar — backend can call this after code generation
      - VALIDATOR_URL=http://validator:8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    depends_on:
      validator:
        condition: service_healthy
    networks:
      - crew-net

  # ── Code Validator: FastAPI Microservice ─────────────────────────────────
  # Language-agnostic validation (syntax, imports, entrypoint, contract).
  # Reads generated code from the shared workspace volume (read-only).
  validator:
    container_name: crew-validator
    build:
      context: ${VALIDATOR_DIR:-../crew-code-validator}
      dockerfile: Containerfile
    ports:
      - "${VALIDATOR_PORT:-8180}:8080"
    volumes:
      # Same workspace PVC as backend — validator reads what agents write
      - crew-workspace:/app/workspace:ro
    environment:
      - LOG_LEVEL=${VALIDATOR_LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 3
    networks:
      - crew-net

  # ── Frontend (optional profile): Pre-built UI image ──────────────────────
  # Activate with: podman compose --profile with-frontend up -d
  # The frontend image must be built with VITE_API_URL pointing at this
  # backend's public URL (e.g. http://localhost:8080).
  frontend:
    container_name: crew-frontend
    image: ${FRONTEND_IMAGE:-quay.io/varkrish/crew-frontend:latest}
    profiles: ["with-frontend"]
    ports:
      - "${FRONTEND_PORT:-3000}:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - crew-net

  # ── Skills Service (optional): Semantic search over skill docs ──────────
  # Standalone repo: https://github.com/varkrish/skills-service
  # Set SKILLS_SERVICE_DIR in .env to point to your local checkout.
  # Uncomment to enable skill-aware agents.
  #
  # skills-service:
  #   container_name: crew-skills
  #   build:
  #     context: ${SKILLS_SERVICE_DIR:-../skills-service}
  #     dockerfile: Containerfile
  #   ports:
  #     - "${SKILLS_PORT:-8090}:8090"
  #   volumes:
  #     - ${SKILLS_DIR:-./skills}:/app/skills:ro
  #   environment:
  #     - SKILLS_BASE_DIR=/app/skills
  #     - SKILLS_INDEX_CACHE_DIR=/app/cache
  #     - PYTHONUNBUFFERED=1
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "curl", "-sf", "http://localhost:8090/health/ready"]
  #     interval: 10s
  #     timeout: 5s
  #     start_period: 30s
  #     retries: 10
  #   networks:
  #     - crew-net

  # ── Ollama (optional): Local LLM inference ──────────────────────────────
  # Uncomment to run models locally instead of using cloud APIs
  #
  # ollama:
  #   container_name: crew-ollama
  #   image: docker.io/ollama/ollama:latest
  #   ports:
  #     - "${OLLAMA_PORT:-11434}:11434"
  #   volumes:
  #     - ollama-models:/root/.ollama
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
  #     interval: 30s
  #     timeout: 10s
  #     start_period: 30s
  #     retries: 3
  #   networks:
  #     - crew-net

volumes:
  crew-workspace:
    driver: local
  crew-data:
    driver: local
  # ollama-models:
  #   driver: local

networks:
  crew-net:
    driver: bridge
