{{- if and .Values.smokeTest.enabled (eq .Values.smokeTest.backend "k8s_job") }}
# RBAC for the backend ServiceAccount to create/manage smoke-test Jobs.
# Only rendered when smokeTest.enabled=true AND smokeTest.backend=k8s_job.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "crew-studio.fullname" . }}-smoke-test
  labels:
    {{- include "crew-studio.labels" . | nindent 4 }}
    app.kubernetes.io/component: smoke-test
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "crew-studio.fullname" . }}-smoke-test
  labels:
    {{- include "crew-studio.labels" . | nindent 4 }}
    app.kubernetes.io/component: smoke-test
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "crew-studio.fullname" . }}-smoke-test
subjects:
  - kind: ServiceAccount
    name: {{ include "crew-studio.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
